# @path services/chms-service/src/main/resources/application.yml
# @owner chms-service
# @responsibility Configuração base do CHMS Service — porta 8084, schema health
# @see docs/ARCHITECTURE.md#chms-service | docs/ENV_CONFIG.md

spring:
  application:
    name: chms-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:platform}
    username: ${CHMS_DB_USER:chms_service_user}
    password: ${CHMS_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: health
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: health
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

jwt:
  secret: ${JWT_SECRET:fofoqueiro-dev-secret-key-must-be-at-least-256-bits-long-for-hmac}

mediamtx:
  api-url: ${MEDIAMTX_API_URL:http://mediamtx:9997}
  auth-token: ${MEDIAMTX_AUTH_TOKEN}

# Consistent hashing — lido do ConfigMap do Kubernetes em produção
chms:
  instance-id: ${CHMS_INSTANCE_ID:chms-0}
  total-instances: ${CHMS_TOTAL_INSTANCES:1}
  polling-interval-ms: ${CHMS_POLLING_INTERVAL_MS:30000}

springdoc:
  swagger-ui:
    path: /docs
    operations-sorter: method
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    com.fofoqueiro.chms: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:16:///test_health
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
