# @path services/audit-service/src/test/resources/application.yml
spring:
  datasource:
    url: jdbc:tc:postgresql:16:///test_audit
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: audit
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: audit
  kafka:
    bootstrap-servers: localhost:9092
management:
  endpoints:
    web:
      exposure:
        include: health
