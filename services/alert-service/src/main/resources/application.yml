# @path services/alert-service/src/main/resources/application.yml
# @owner alert-service
# @responsibility Configuração base do Alert Service — porta 8086, schema alerts, WebSocket STOMP
# @see docs/ARCHITECTURE.md#alert-service | docs/ENV_CONFIG.md

spring:
  application:
    name: alert-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:platform}
    username: ${ALERT_DB_USER:alert_service_user}
    password: ${ALERT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: alerts
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: alerts
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${SERVER_PORT:8086}

jwt:
  secret: ${JWT_SECRET:fofoqueiro-dev-secret-key-must-be-at-least-256-bits-long-for-hmac}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    com.fofoqueiro.alert: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:16:///test_alerts
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
