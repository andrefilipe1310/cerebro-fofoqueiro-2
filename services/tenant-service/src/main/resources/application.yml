# @path services/tenant-service/src/main/resources/application.yml
# @owner tenant-service
# @responsibility Configuração base do Tenant Service — porta 8082, schema tenants
# @see docs/ARCHITECTURE.md#tenant-service | docs/ENV_CONFIG.md

spring:
  application:
    name: tenant-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:platform}
    username: ${TENANT_DB_USER:tenant_service_user}
    password: ${TENANT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: tenants
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: tenants
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${SERVER_PORT:8082}

jwt:
  secret: ${JWT_SECRET:fofoqueiro-dev-secret-key-must-be-at-least-256-bits-long-for-hmac}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /docs
    operations-sorter: method
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    com.fofoqueiro.tenant: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    root: INFO
    com.fofoqueiro.tenant: INFO

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:16:///test_tenants
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
