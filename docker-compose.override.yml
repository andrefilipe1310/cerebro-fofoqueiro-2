# @path docker-compose.override.yml
# @owner infra
# @responsibility Overrides para desenvolvimento local — hot reload real com mvn spring-boot:run
# Este arquivo é aplicado automaticamente pelo docker compose no dev.
#
# Estratégia de hot reload:
#   - Serviços Java: substitui o command para rodar `mvn spring-boot:run` com Spring DevTools.
#     Isso habilita reload automático ao detectar mudanças em .class (via IDE ou mvn compile).
#   - Frontend Next.js: npm run dev com hot reload nativo via volume mount.

services:
  # Expõe portas de infra no host para acesso direto com clientes
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  redpanda:
    ports:
      - "19092:19092"
      - "9644:9644"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  # ─── SERVIÇOS SPRING BOOT — hot reload via Spring DevTools ─────────────────
  # O container usa a imagem Maven (builder stage) e monta o código-fonte.
  # Spring DevTools detecta mudanças em .class e reinicia o contexto sem restart JVM.
  # Para compilar enquanto desenvolve: `cd services/auth-service && mvn compile` no host.

  auth-service:
    build:
      context: ./services/auth-service
      target: builder        # usa o stage Maven, não o runtime
    image: fofoqueiro/auth-service:dev
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./services/auth-service:/app
      - maven_cache:/root/.m2
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: "2s"

  organization-service:
    build:
      context: ./services/tenant-service
      target: builder
    image: fofoqueiro/organization-service:dev
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./services/tenant-service:/app
      - maven_cache:/root/.m2

  camera-service:
    build:
      context: ./services/camera-service
      target: builder
    image: fofoqueiro/camera-service:dev
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./services/camera-service:/app
      - maven_cache:/root/.m2

  chms-service:
    build:
      context: ./services/chms-service
      target: builder
    image: fofoqueiro/chms-service:dev
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./services/chms-service:/app
      - maven_cache:/root/.m2

  recording-service:
    build:
      context: ./services/recording-service
      target: builder
    image: fofoqueiro/recording-service:dev
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./services/recording-service:/app
      - maven_cache:/root/.m2

  alert-service:
    build:
      context: ./services/alert-service
      target: builder
    image: fofoqueiro/alert-service:dev
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./services/alert-service:/app
      - maven_cache:/root/.m2

  notification-service:
    build:
      context: ./services/notification-service
      target: builder
    image: fofoqueiro/notification-service:dev
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./services/notification-service:/app
      - maven_cache:/root/.m2

  audit-service:
    build:
      context: ./services/audit-service
      target: builder
    image: fofoqueiro/audit-service:dev
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    volumes:
      - ./services/audit-service:/app
      - maven_cache:/root/.m2

  # Frontend Next.js com hot reload nativo
  frontend:
    build:
      context: ./frontend
      target: deps
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules   # preserva node_modules instalados no build do container
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  # Cache Maven compartilhado entre todos os serviços no dev — evita re-download
  maven_cache:
