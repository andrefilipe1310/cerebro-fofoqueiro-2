# @path services/recording-service/src/test/resources/application.yml
spring:
  datasource:
    url: jdbc:tc:postgresql:16:///test_recordings
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: recordings
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: recordings
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6370
      password: ""
r2:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: test-bucket
  public-url: http://localhost:9000/test-bucket
management:
  endpoints:
    web:
      exposure:
        include: health
