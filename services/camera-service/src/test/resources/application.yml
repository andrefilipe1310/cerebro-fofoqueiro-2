# @path services/camera-service/src/test/resources/application.yml
spring:
  datasource:
    url: jdbc:tc:postgresql:16:///test_cameras
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: cameras
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: cameras
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6370
      password: ""
encryption:
  key: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzLWhlcmU=
mediamtx:
  api-url: http://localhost:9997
  auth-token: test-token
  public-url: http://localhost:8889
r2:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: test-bucket
internal:
  api-secret: test-internal
management:
  endpoints:
    web:
      exposure:
        include: health
