# @path infra/nginx/nginx.conf
# @owner infra
# @responsibility Nginx reverse proxy para desenvolvimento local
# @see docs/ARCHITECTURE.md#deploy

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'req_id=$http_x_request_id';

    access_log /var/log/nginx/access.log main;
    sendfile   on;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Upstreams ──────────────────────────────────────────────────────────────

    upstream kong          { server kong:8000; }
    upstream frontend      { server frontend:3000; }
    upstream auth          { server auth-service:8081; }
    upstream org           { server organization-service:8082; }
    upstream camera        { server camera-service:8083; }
    upstream chms          { server chms-service:8084; }
    upstream recording     { server recording-service:8085; }
    upstream alert         { server alert-service:8086; }
    upstream notification  { server notification-service:8087; }
    upstream audit         { server audit-service:8088; }

    # ─── Frontend + API Gateway (porta 80) ──────────────────────────────────────

    server {
        listen 80;
        server_name localhost;

        location /api/ {
            proxy_pass http://kong;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws {
            proxy_pass http://kong;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ─── Swagger UI por serviço ──────────────────────────────────────────────────
    # Cada serviço tem porta própria (18081-18088) para evitar CORS nos paths absolutos
    # do Swagger UI (/swagger-ui/, /v3/api-docs/).
    #
    # Solução CORS: todas as chamadas de API do Swagger vão para /api/ na MESMA porta
    # (same-origin) → Nginx proxia para Kong → Kong roteia para o serviço correto.
    # O header Host inclui a porta ($http_host) para que springdoc gere o servers.url
    # correto (ex: http://localhost:18081) em vez de http://localhost.
    #
    # Porta  | Serviço              | Swagger
    # 18081  | auth-service         | http://localhost:18081/docs
    # 18082  | tenant-service       | http://localhost:18082/docs
    # 18083  | camera-service       | http://localhost:18083/docs
    # 18084  | chms-service         | http://localhost:18084/docs
    # 18085  | recording-service    | http://localhost:18085/docs
    # 18086  | alert-service        | http://localhost:18086/docs
    # 18087  | notification-service | http://localhost:18087/docs
    # 18088  | audit-service        | http://localhost:18088/docs

    server {
        listen 18081;
        server_name _;
        location /api/ {
            proxy_pass         http://kong;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location / {
            proxy_pass         http://auth;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 18082;
        server_name _;
        location /api/ {
            proxy_pass         http://kong;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location / {
            proxy_pass         http://org;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 18083;
        server_name _;
        location /api/ {
            proxy_pass         http://kong;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location / {
            proxy_pass         http://camera;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 18084;
        server_name _;
        location /api/ {
            proxy_pass         http://kong;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location / {
            proxy_pass         http://chms;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 18085;
        server_name _;
        location /api/ {
            proxy_pass         http://kong;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location / {
            proxy_pass         http://recording;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 18086;
        server_name _;
        location /api/ {
            proxy_pass         http://kong;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        # WebSocket do alert-service (STOMP)
        location /ws {
            proxy_pass         http://kong;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
        }
        location / {
            proxy_pass         http://alert;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 18087;
        server_name _;
        location /api/ {
            proxy_pass         http://kong;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location / {
            proxy_pass         http://notification;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 18088;
        server_name _;
        location /api/ {
            proxy_pass         http://kong;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
        location / {
            proxy_pass         http://audit;
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
