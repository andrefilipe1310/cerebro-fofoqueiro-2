# @path services/notification-service/src/main/resources/application.yml
# @owner notification-service
# @responsibility Configuração base do Notification Service — porta 8087, stateless (sem banco)
# @see docs/ARCHITECTURE.md#notification-service | docs/ENV_CONFIG.md

spring:
  application:
    name: notification-service

  # Sem banco de dados — serviço stateless
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  mail:
    host: ${SMTP_HOST:mailhog}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    mail:
      enabled: false   # evita conexão SMTP no /actuator/health — credenciais variam por env

email:
  from: ${EMAIL_FROM:noreply@fofoqueiro.com}
  from-name: ${EMAIL_FROM_NAME:Fofoqueiro}

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    com.fofoqueiro.notification: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  mail:
    host: ${SMTP_HOST:smtp.sendgrid.net}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:apikey}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: test
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
