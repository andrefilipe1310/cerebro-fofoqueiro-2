# @path services/alert-service/src/test/resources/application.yml
spring:
  datasource:
    url: jdbc:tc:postgresql:16:///test_alerts
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: alerts
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: alerts
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6370
      password: ""
management:
  endpoints:
    web:
      exposure:
        include: health
