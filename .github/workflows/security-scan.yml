# @path .github/workflows/security-scan.yml
# @owner infra
# @responsibility Security scan semanal das imagens Docker — Trivy
# @see docs/ARCHITECTURE.md#deploy

name: Security Scan

on:
  schedule:
    - cron: '0 2 * * 1'   # segunda-feira às 02:00 UTC
  workflow_dispatch:

jobs:
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, tenant, camera, chms, recording, alert, notification, audit]

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }}-service image
        run: docker build -t fofoqueiro/${{ matrix.service }}-service:scan ./services/${{ matrix.service }}-service

      - name: Scan ${{ matrix.service }}-service image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fofoqueiro/${{ matrix.service }}-service:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: ${{ matrix.service }}-service
