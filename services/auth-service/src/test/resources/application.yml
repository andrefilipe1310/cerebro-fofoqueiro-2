# @path services/auth-service/src/test/resources/application.yml
# @owner auth-service
# @responsibility Configuração de teste — Testcontainers sobe PostgreSQL e Redis reais
spring:
  datasource:
    # Testcontainers JDBC URL — sobe um PostgreSQL 16 automaticamente
    url: jdbc:tc:postgresql:16:///test_auth?TC_INITSCRIPT=db/init/test-schemas.sql
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: auth
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: auth
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
  data:
    redis:
      host: localhost
      port: 6370
      password: ""

jwt:
  secret: test-secret-256-bits-min-padding-here-ok
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

encryption:
  key: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzLWhlcmU=

totp:
  issuer: FofoqueiroTest

management:
  endpoints:
    web:
      exposure:
        include: health
