# @path .github/workflows/ci.yml
# @owner infra
# @responsibility CI — testa todos os serviços e frontend a cada push/PR
# @see docs/ARCHITECTURE.md#deploy

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ─── JAVA SERVICES ───────────────────────────────────────────────────────────
  test-services:
    name: Test ${{ matrix.service }}-service
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, tenant, camera, chms, recording, alert, notification, audit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Test ${{ matrix.service }}-service
        working-directory: services/${{ matrix.service }}-service
        run: mvn test -B --no-transfer-progress
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}-service/target/surefire-reports/

  # ─── FRONTEND ────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check || true

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_MEDIA_URL: http://localhost:8889
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
          NEXT_PUBLIC_APP_ENV: ci

  # ─── SECURITY SCAN ───────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-services, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
