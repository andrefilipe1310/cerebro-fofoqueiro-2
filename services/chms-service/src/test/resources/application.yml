# @path services/chms-service/src/test/resources/application.yml
spring:
  datasource:
    url: jdbc:tc:postgresql:16:///test_health
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: health
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: health
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6370
      password: ""
mediamtx:
  api-url: http://localhost:9997
  auth-token: test-token
chms:
  instance-id: chms-0
  total-instances: 1
  polling-interval-ms: 30000
management:
  endpoints:
    web:
      exposure:
        include: health
