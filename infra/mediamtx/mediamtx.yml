# @path infra/mediamtx/mediamtx.yml
# @owner infra
# @responsibility Configuração do MediaMTX — RTSP ingestion, WebRTC WHEP, HLS, auth via webhook
# @see docs/MEDIA_PIPELINE.md | docs/ARCHITECTURE.md#fluxo-live

logLevel: info
logDestinations: [stdout]

# API REST de administração — usada pelo CHMS Service para polling de câmeras
api: yes
apiAddress: :9997

# Auth via webhook — camera-service valida cada acesso por token HMAC
# @see docs/SDD.md#webhook-auth-mediamtx | docs/MULTI_TENANCY.md#isolamento-midia
auth:
  method: http
  http:
    address: http://camera-service:8083/internal/media/auth

# WebRTC WHEP para latência < 500ms
# @see docs/ARCHITECTURE.md#fluxo-live (ADR-013)
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: 0.0.0.0:8189
webrtcIPsFromInterfaces: yes
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  # Em produção, adicionar TURN server para redes corporativas restritas:
  # - url: turn:turn.fofoqueiro.com:3478
  #   username: ${TURN_USERNAME}
  #   password: ${TURN_CREDENTIAL}

# HLS para playback de timeline — segmentos de 6s
# @see docs/MEDIA_PIPELINE.md#gravacao-continua
hls: yes
hlsAddress: :8888
hlsSegmentDuration: 6s
hlsSegmentCount: 6
hlsAllowOrigin: "*"

# RTSP ingestion das câmeras IP
rtsp: yes
rtspAddress: :8554

# Gravação contínua para segmentação HLS
# @see docs/ARCHITECTURE.md#fluxo-gravacao
pathDefaults:
  record: yes
  recordPath: /tmp/recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordSegmentDuration: 60s

# Paths por câmera: tenant_{tenant_id}/camera_{camera_id}/{quality}
# Ex: tenant_abc123/camera_xyz789/main
paths:
  "~^tenant_[a-f0-9-]+/camera_[a-f0-9-]+/(main|sub|thumb)$":
    source: publisher
